name: Wavelength CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm install

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Run server tests
        run: cd server && npm test -- --passWithNoTests

  deploy-check:
    name: Deploy Ready Check
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify environment files exist
        run: |
          test -f server/prisma/schema.prisma && echo "✅ Prisma schema found"
          test -f client/vite.config.js && echo "✅ Vite config found"
          test -f docker-compose.yml && echo "✅ Docker compose found"
          echo "✅ All checks passed — ready to deploy"